<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>HanaTalk</title>
  <meta name="description" content="Belajar Korea untuk kerja klinik dan kehidupan sehari-hari di Korea.">
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500..700&family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;1,400&family=Noto+Sans+KR:wght@400;500;700&display=swap">
  <link rel="stylesheet" href="style.css">
  <meta name="theme-color" content="#1c2541">
</head>
<body>
  <header class="app-header">
    <h1>HanaTalk</h1>
  </header>
  <main>
    <section id="screen-drill"></section>
    <section id="screen-phrasebook" hidden></section>
    <section id="screen-settings" hidden></section>
  </main>
  <nav class="bottom-nav">
    <button id="nav-drill" class="active">📚 Drill</button>
    <button id="nav-phrasebook">📋 Phrasebook</button>
    <button id="nav-settings">⚙️ Settings</button>
  </nav>

  <script src="data.js"></script>
  <script src="progress.js"></script>
  <script src="audio.js"></script>
  <script src="drill.js"></script>
  <script src="phrasebook.js"></script>
  <script src="settings.js"></script>
  <script src="audio/manifest.js"></script>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
  </script>
</body>
</html>
